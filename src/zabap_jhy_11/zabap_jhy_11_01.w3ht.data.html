<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html>

<head>
    <meta charset="UTF-8" />
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        function _oncomplete(data) {
            // 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

            // 각 주소의 노출 규칙에 따라 주소를 조합한다.
            // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
            var addr = "";                      // 주소 변수
            var extraAddr = "";                 // 참고항목 변수

            //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
            if (data.userSelectedType === "R") {
                addr = data.roadAddress;        // 사용자가 도로명 주소를 선택했을 경우
            } else {
                addr = data.jibunAddress;       // 사용자가 지번 주소를 선택했을 경우(J)
            }

            // 사용자가 선택한 주소가 도로명 타입일때 참고항목을 조합한다.
            if (data.userSelectedType === "R") {
                // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                if (data.bname !== "" && /[동|로|가]$/g.test(data.bname)) {
                    extraAddr += data.bname;
                }
                // 건물명이 있고, 공동주택일 경우 추가한다.
                if (data.buildingName !== "" && data.apartment === "Y") {
                    extraAddr += extraAddr !== "" ? ", " + data.buildingName : data.buildingName;
                }
                // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                if (extraAddr !== "") {
                    extraAddr = " (" + extraAddr + ")";
                }
            }

            document.getElementById("inputZoneCode").value = data.zonecode;    // 우편번호
            document.getElementById("inputAddr1").value = addr;             // 주소 타입에 따른 주소 값
            document.getElementById("inputAddr2").value = extraAddr;        // 조합된 참고항목
            document.getElementById("myForm").submit();
        }
    </script>
    <script>
        window.onload = function () {
            // 우편번호 찾기 찾기 화면을 넣을 element
            var element_wrap = document.getElementById("wrap");

            //아래 코드처럼 테마 객체를 생성합니다.(color값은 #F00, #FF0000 형식으로 입력하세요.)
            //변경되지 않는 색상의 경우 주석 또는 제거하시거나 값을 공백으로 하시면 됩니다.
            var themeObj = {
                //bgColor: "", //바탕 배경색
                searchBgColor: "#0B65C8", //검색창 배경색
                //contentBgColor: "", //본문 배경색(검색결과,결과없음,첫화면,검색서제스트)
                //pageBgColor: "", //페이지 배경색
                //textColor: "", //기본 글자색
                queryTextColor: "#FFFFFF", //검색창 글자색
                //postcodeTextColor: "", //우편번호 글자색
                //emphTextColor: "", //강조 글자색
                //outlineColor: "", //테두리
            };

            new daum.Postcode({
                theme: themeObj,
                oncomplete: this._oncomplete,

                // 우편번호 찾기 화면 크기가 조정되었을때 실행할 코드를 작성하는 부분. iframe을 넣은 element의 높이값을 조정한다.
                onresize: function (size) {
                    element_wrap.style.height = size.height + "px";
                },
                width: "100%",
                height: "100%",
            }).embed(element_wrap);
        };
    </script>
</head>

<body>
    <div id="wrap" style="display: block;border: 1px solid;width: 100%;height: 100%;position: relative;">
        <!-- <div id="wrap" style="display:block;border:1px solid;width:500px;height:300px;margin:5px 0;position:relative"> -->
    </div>
    <div style="display: none;">
        <form id="myForm" method="POST" action="SAPEVENT:POSTAL">
            <input type="text" name="zonecode" id="inputZoneCode" />
            <input type="text" name="addr1" id="inputAddr1" />
            <input type="text" name="addr2" id="inputAddr2" />
            <button type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
